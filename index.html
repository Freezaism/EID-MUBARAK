<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ketupat Cinta Nadine</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f8faec;       
            --console-bg: #065f46;    /* Hijau Ketupat */
            --gold: #f59e0b;          /* Emas */
            --gold-glow: rgba(245, 158, 11, 0.6);
            --bucin-pink: #f43f5e;    /* Pink Merona */
            --bucin-pink-glow: rgba(244, 63, 94, 0.5);
            --card-back: #10b981;     
            --card-front: #fff1f2;    
            --text-light: #fdfbf7;
            --text-dark: #064e3b;
        }

        * { box-sizing: border-box; touch-action: manipulation; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; background: var(--bg-body);
            font-family: 'Quicksand', sans-serif; color: var(--text-light);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(var(--gold) 1px, transparent 1px);
            background-size: 25px 25px;
        }

        /* --- BINGKAI HP/CONSOLE --- */
        #console {
            width: 100%; max-width: 420px; height: 95vh; max-height: 880px;
            background: linear-gradient(145deg, var(--console-bg), #022c22);
            border: 5px solid var(--gold); border-radius: 30px;
            position: relative; display: flex; flex-direction: column;
            padding: 15px;
            box-shadow: 0 20px 40px rgba(6, 78, 59, 0.4), inset 0 0 15px rgba(0,0,0,0.5);
        }

        .top-deco {
            height: 12px; width: 60px; margin: 0 auto 15px auto;
            background: rgba(255,255,255,0.2); border-radius: 10px;
        }

        /* --- SCREEN AREA --- */
        #screen-border {
            flex: 1; background: var(--bg-body); border-radius: 20px;
            border: 3px solid var(--gold); position: relative;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.05);
        }

        .screen-view {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            padding: 20px; z-index: 10;
            background: linear-gradient(135deg, #fdfbf7 0%, #fae8ff 100%);
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hidden { opacity: 0; pointer-events: none; transform: translateY(20px) scale(0.95); z-index: 0; }

        /* --- START & WIN SCREEN --- */
        .layout-center { align-items: center; justify-content: center; text-align: center; }
        
        .photo-slot {
            width: 130px; height: 130px; border: 5px solid var(--gold);
            border-radius: 50%; overflow: hidden; margin-bottom: 15px;
            box-shadow: 0 10px 25px var(--gold-glow); background: #fff;
            padding: 4px; position: relative;
        }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        h1 { 
            font-family: 'Pacifico', cursive; 
            font-size: 32px; color: var(--bucin-pink); 
            margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(244, 63, 94, 0.2); 
            line-height: 1.2;
        }
        
        p { font-size: 14px; color: var(--text-dark); line-height: 1.6; margin-bottom: 25px; font-weight: 700; }

        .btn {
            background: linear-gradient(135deg, var(--bucin-pink), #e11d48); 
            color: #fff; border: none;
            padding: 16px 32px; font-family: inherit; font-size: 16px; font-weight: 900;
            cursor: pointer; border-radius: 50px; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 8px 0 #9f1239, 0 15px 20px var(--bucin-pink-glow); 
            transition: all 0.1s;
        }
        .btn:active { transform: translateY(6px); box-shadow: 0 2px 0 #9f1239, 0 5px 10px var(--bucin-pink-glow); }
        
        .btn-pulse {
            animation: heartbeat 1.5s infinite;
        }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.05); }
            30% { transform: scale(1); }
            45% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* --- GAME SCREEN --- */
        #game-screen { padding: 15px; }
        .hud {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 15px; color: var(--text-dark); margin-bottom: 20px;
            padding-bottom: 10px; border-bottom: 3px dashed rgba(245, 158, 11, 0.5);
            font-weight: 900;
        }
        
        .target-box {
            background: var(--bucin-pink); color: white; padding: 4px 12px; 
            border-radius: 20px; box-shadow: 0 4px 10px var(--bucin-pink-glow);
            animation: pulseGlow 2s infinite;
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 5px var(--bucin-pink-glow); }
            50% { box-shadow: 0 0 20px var(--bucin-pink); }
            100% { box-shadow: 0 0 5px var(--bucin-pink-glow); }
        }

        /* --- CARD LAYOUT --- */
        #card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            grid-template-rows: repeat(5, 1fr);    
            gap: 12px;
            width: 100%; height: 100%;
        }

        .card { background-color: transparent; perspective: 1000px; cursor: pointer; }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            text-align: center; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08); border-radius: 16px;
        }

        .card.flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%;
            -webkit-backface-visibility: hidden; backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center;
            border-radius: 16px;
        }

        .card-back {
            background: linear-gradient(135deg, var(--card-back), #059669); border: 2px solid var(--gold);
            color: var(--gold); font-size: 32px; font-weight: 900;
        }
        .card-back::after { content: "?"; font-size: 24px; text-shadow: 0 0 10px var(--gold-glow);}

        .card-front {
            background: var(--card-front); border: 3px solid var(--bucin-pink);
            color: var(--bucin-pink); transform: rotateY(180deg);
            font-size: 36px; font-weight: 900;
            box-shadow: inset 0 0 20px var(--bucin-pink-glow);
        }
        
        .card.wrong .card-inner { animation: shake 0.4s ease-in-out; }
        .card.wrong .card-inner .card-front {
            border-color: #ef4444; color: #ef4444; background: #fee2e2;
        }
        @keyframes shake {
            0%, 100% { transform: rotateY(180deg) translateX(0); }
            20%, 60% { transform: rotateY(180deg) translateX(-6px) rotate(-2deg); }
            40%, 80% { transform: rotateY(180deg) translateX(6px) rotate(2deg); }
        }

        .card.solved .card-inner .card-front {
            border-color: var(--gold); color: var(--gold);
            background: #fffbeb; box-shadow: none; opacity: 0.6;
            transform: rotateY(180deg) scale(0.95);
        }

        /* --- WIN SCREEN & SURAT --- */
        #win-screen { padding: 20px; }
        #win-screen h1 { font-size: 28px; }
        #win-screen .photo-slot { border-color: var(--bucin-pink); animation: float 3s ease-in-out infinite; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        #letter-container {
            width: 100%; height: 45%; background: rgba(255,255,255,0.9);
            border: 3px solid var(--bucin-pink); border-radius: 20px;
            padding: 15px; margin-bottom: 20px; position: relative;
            box-shadow: 0 10px 25px rgba(244, 63, 94, 0.15);
        }
        #letter-scroll {
            width: 100%; height: 100%; overflow-y: auto; overflow-x: hidden;
            font-size: 14px; font-weight: 700;
            line-height: 1.7; color: var(--text-dark); text-align: left;
            word-wrap: break-word; white-space: pre-wrap;
            scrollbar-width: thin; scrollbar-color: var(--bucin-pink) transparent;
        }

        /* --- CONFETTI --- */
        .confetti {
            position: absolute; width: 10px; height: 10px; z-index: 100;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

    </style>
</head>
<body>

<div id="console">
    <div class="top-deco"></div>
    <div id="screen-border">

        <div id="start-screen" class="screen-view layout-center">
            <div class="photo-slot">
                <img src="https://files.catbox.moe/30ac7s.png" alt="Nadine">
            </div>
            <h1>Eid Mubarak</h1>
            <p>
                Hai nadineeeeee<br>
                selamat hari raya idul fitrii yaaa, mohon maaf lahir dan batinn<br><br>
                Biar seruu yukk ada game nihh, dan banyak yang akan aku sampaikann
            </p>
            <button class="btn btn-pulse" onclick="startGame()">Start</button>
        </div>

        <div id="game-screen" class="screen-view hidden">
            <div class="hud">
                <span>Eid mubarak cantik 🕌</span>
                <span>Cari: <strong class="target-box" id="target-number">1</strong></span>
            </div>
            <div id="card-grid"></div>
        </div>

        <div id="win-screen" class="screen-view layout-center hidden">
            <div class="photo-slot" style="width: 100px; height: 100px;">
                <img src="https://files.catbox.moe/i58m43.png" alt="Us">
            </div>
            <h1>Yeay, Utuh Lagi! ✨</h1>
            
            <div id="letter-container">
                <div id="letter-scroll">
                    <div id="typewriter-text"></div>
                </div>
            </div>

            <button class="btn" style="background:var(--gold); box-shadow:0 8px 0 #b45309; color:#064e3b; padding:12px 24px; font-size:14px;" onclick="location.reload()">Kangen? Main Lagi!</button>
        </div>

    </div>
</div>

<script>
    // --- ISI SURAT BUCIN LEBARAN ---
    const letterContent = `haii haii haaiii minal aidzin wal faidzinn yaaaa.. selamatt hari rayaa idul fitrii nadineeeee...
    
    wahh ga kerasaa sudahh lebaran lagii ajaa yaaa, inii tahun kedua kitaaa bertemu lebarann yaaaa, alhamdulillah dehh masih di beri kesempatan buat ketemu lebaran lagiii, semogaa kedepanyyaa kitaa bisa bertemu lebaran lebaran selanjutnyaa yaaaa..
   
    pertama tamaa fathan mau ngucapin perminta maafan sebesar besarnyaa kalau selama ini fathan ada salah sama nadinee yaaa, banyaakk bangett kesalahan fathann, mungkin jugaa ada beberapaa kesalahan yang susah kamu maafin tetapi semogaa di hari raya ini kamu maafinn aku yaaaa.. kalau untuk kamuu, kamuu tida usaa mintaa maaff yaaa karenaa udaa fathann maafinn selaluu kokk jadi aman ajaaa yaaaa
    
    fathann jugaa mau ngucapinn timakasii sebanyak banyaknyaa yaaa, karenaa udaa hadirrr di hidupkuu dalam beberapa tahun iniii, sekali lagi mintaa maaff yaa kalau banyak salahnyaa baik itu dari kataa atau perbuataannn.. semogaa dengan ketulussn hati nadinee untuk memaafkan fathann akan menjadii berkahh untuk kedepannyaa yaaa aamiin
    
    sedikit curhatt, puasaa kali ini cukupp sedihh sii karenaa akhir akhir ini kitaa jarang chatan, dan kalau chatan malah seringnyaa berantemm huhuu sedihh dehhh, mintaa maaff yaa kalau resek everydayy, tapi semogaa idul fitri kali ini menjadii titik balik hubungan kitaa agar kembali menjadi seruu dann mengesankan yaaaa.. yaa semogaa kamu juga sempet mainin game inii besokk walaupun aku tau bakal chaotic bangett kehidupanmuu besokk, jujurr kangen bsnget deh cerita ceritaa tentang kehidupan sehari hari kitaaa huhuu..
    
    yasudaa mungkinn cukuo segini duluu ajaa yaaaa, semogaa dengan ssling memaafkannya kitaa akan menjadii berkah buat kita kedepannya yaa (lolos snbp) aamiin yaallah, sekali lagii minal aidzin wal faidzin yaaa nadineeee.. dann semogaa besokk menjadiu hsri yabg seruu buat kita berduaa yaaaa.. kalau memungkinkannn kitaa bisaa kembalii sepertii semulaa yaaaa, okeydeee paipaipaipaiiii semangatt buat harii iniii, semogaa dapat uang THR banyak banyakkk, aamiin.. je t'aimeee bieennn mon amourrr 💙🩵💙🩵💙🩵💙🩵💙🩵💙🩵💙`;

    // --- GAME LOGIC ---
    let audioCtx;
    const TOTAL_NUMBERS = 10;
    let cardsData = []; 
    let nextRequiredNumber = 1;
    let isPaused = false;

    function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    // EFEK SUARA
    function playTone(type) {
        if(!audioCtx) return;
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'flip') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(450, now);
            gain.gain.setValueAtTime(0.05, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'correct') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(700, now);
            osc.frequency.exponentialRampToValueAtTime(1000, now + 0.2);
            gain.gain.setValueAtTime(0.08, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        } else if (type === 'wrong') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(200, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
            gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'win') {
            const victoryNotes = [523, 659, 783, 1046, 1318]; 
            victoryNotes.forEach((freq, i) => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination); o.type = 'sine'; o.frequency.value = freq;
                g.gain.setValueAtTime(0.08, now + i*0.1); g.gain.exponentialRampToValueAtTime(0.001, now + i*0.1 + 0.6);
                o.start(now + i*0.1); o.stop(now + i*0.1 + 0.6);
            });
        }
    }

    function startGame() {
        initAudio();
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        playTone('correct');
        setupGrid();
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function setupGrid() {
        const gridEl = document.getElementById('card-grid');
        gridEl.innerHTML = '';
        cardsData = [];
        nextRequiredNumber = 1;
        updateHud();

        let numbers = Array.from({ length: TOTAL_NUMBERS }, (_, i) => i + 1);
        shuffleArray(numbers);

        numbers.forEach(num => {
            const cardEl = document.createElement('div');
            cardEl.className = 'card';
            
            const inner = document.createElement('div');
            inner.className = 'card-inner';
            
            const front = document.createElement('div');
            front.className = 'card-front';
            front.innerText = num; 
            
            const back = document.createElement('div');
            back.className = 'card-back';
            
            inner.appendChild(front);
            inner.appendChild(back);
            cardEl.appendChild(inner);
            
            cardEl.onclick = () => flipCard(cardEl, num);
            
            gridEl.appendChild(cardEl);
            cardsData.push({ value: num, el: cardEl });
        });
    }

    function updateHud() {
        document.getElementById('target-number').innerText = nextRequiredNumber;
    }

    function flipCard(cardEl, value) {
        if (isPaused || cardEl.classList.contains('flipped') || cardEl.classList.contains('solved')) return;

        initAudio(); 
        playTone('flip');
        cardEl.classList.add('flipped');

        if (value === nextRequiredNumber) {
            // JIKA BENAR
            cardEl.classList.add('solved');
            playTone('correct');
            nextRequiredNumber++;
            updateHud();

            if (nextRequiredNumber > TOTAL_NUMBERS) {
                // JIKA MENANG
                setTimeout(winGame, 800);
            }
        } else {
            // JIKA SALAH
            isPaused = true;
            cardEl.classList.add('wrong');
            playTone('wrong');
            
            setTimeout(() => {
                cardEl.classList.remove('wrong');
                const allCards = document.querySelectorAll('.card');
                allCards.forEach(c => {
                    c.classList.remove('flipped', 'solved');
                });
                
                nextRequiredNumber = 1;
                updateHud();
                isPaused = false;
            }, 800);
        }
    }

    function winGame() {
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('win-screen').classList.remove('hidden');
        playTone('win');
        createConfetti();
        typeWriter();
    }

    // EFEK KETIK SURAT
    function typeWriter() {
        const textEl = document.getElementById('typewriter-text');
        const scrollEl = document.getElementById('letter-scroll');
        textEl.innerHTML = ''; 
        let i = 0;
        
        function type() {
            if(i < letterContent.length) {
                if (letterContent.charAt(i) === '\n') {
                    textEl.innerHTML += '<br>';
                } else {
                    textEl.innerHTML += letterContent.charAt(i);
                }
                i++;
                scrollEl.scrollTop = scrollEl.scrollHeight;
                setTimeout(type, 40); 
            }
        }
        setTimeout(type, 1000); 
    }

    // EFEK CONFETTI
    function createConfetti() {
        const colors = ['#f59e0b', '#10b981', '#f43f5e', '#3b82f6', '#a855f7'];
        const container = document.getElementById('screen-border');
        
        for(let i=0; i<50; i++) {
            const conf = document.createElement('div');
            conf.className = 'confetti';
            conf.style.left = Math.random() * 100 + '%';
            conf.style.top = '-10px';
            conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            conf.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
            conf.style.animationDelay = (Math.random() * 1) + 's';
            container.appendChild(conf);
        }
    }

</script>
</body>
</html>
